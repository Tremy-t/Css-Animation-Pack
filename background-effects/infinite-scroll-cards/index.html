<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Endless Scrolling Cards</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="scroll-container">
    <div class="scroll-track">
      <!-- Original Cards -->
      <div class="card"><i data-lucide="zap"></i></div>
      <div class="card"><i data-lucide="sparkles"></i></div>
      <div class="card"><i data-lucide="rocket"></i></div>
      <div class="card"><i data-lucide="crown"></i></div>
      <!-- Duplicated Cards for Loop Illusion -->
      <div class="card"><i data-lucide="zap"></i></div>
      <div class="card"><i data-lucide="sparkles"></i></div>
      <div class="card"><i data-lucide="rocket"></i></div>
      <div class="card"><i data-lucide="crown"></i></div>
    </div>
  </div>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
