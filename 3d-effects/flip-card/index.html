<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flip Card Profile</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="flip-card">
    <div class="flip-card-inner">
      <div class="flip-card-front">
        <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=200&h=200&q=80" alt="Avatar" class="avatar">
        <h3>Creative Pro</h3>
      </div>
      <div class="flip-card-back">
        <h3>Jane Doe</h3>
        <p>Lead Designer</p>
        <div class="socials">
          <i data-lucide="twitter"></i>
          <i data-lucide="github"></i>
        </div>
      </div>
    </div>
  </div>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
